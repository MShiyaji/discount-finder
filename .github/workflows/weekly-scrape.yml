name: Weekly Scrape — Discover & Research

on:
  schedule:
    # Runs every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual triggering from the Actions tab

env:
  SITE_URL: ${{ secrets.SITE_URL }}          # e.g. https://your-app.vercel.app
  CRON_SECRET: ${{ secrets.CRON_SECRET }}    # Must match the CRON_SECRET env var on your deployment

jobs:
  discover:
    name: Discover New Services
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/discover
        run: |
          echo "🔍 Triggering service discovery..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/discover")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Discover endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi

  research:
    name: Research Discounts
    runs-on: ubuntu-latest
    needs: discover  # Run after discovery completes
    steps:
      - name: Call /api/cron/research
        run: |
          echo "🔬 Triggering discount research..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 600 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/research")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Status: $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Research endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
